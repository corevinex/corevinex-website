<style>.attack{stroke-dasharray:18 22;animation:routeDash 3.6s linear infinite}.attack-b{animation-duration:4.4s}.attack-c{animation-duration:5.2s}.attack-d{animation-duration:4s}.attack-e{animation-duration:5.7s}.attack-f{animation-duration:4.8s}.node{animation:nodePulse 2.5s ease-in-out infinite;transform-origin:center}.scan{animation:scanMove 6.8s ease-in-out infinite}.continent{animation:continentGlow 5.8s ease-in-out infinite}@keyframes routeDash{to{stroke-dashoffset:-300}}@keyframes nodePulse{0%,100%{opacity:.82;stroke-width:5}50%{opacity:1;stroke-width:8}}@keyframes scanMove{0%{transform:translateY(0);opacity:.04}45%{opacity:.55}100%{transform:translateY(610px);opacity:.04}}@keyframes continentGlow{0%,100%{opacity:.70}50%{opacity:.90}}</style></svg>
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description"
        content="Corevinex Cybersecurity — enterprise cyber defense, cloud security, incident readiness and global threat visibility.">

    <title>Corevinex | Contact us</title>
    <link rel="stylesheet" href="css/styles.css">
	<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
 	<link rel="icon" href="/favicon.ico" sizes="any">
</head>

<body>
    <div class="aurora"></div>
    <canvas id="particles" aria-hidden="true"></canvas>

    <div class="site">

        <header class="header">
            <div class="container nav">
                <a href="index.html">
                    <img class="logo" src="assets/corevinex-logo.svg" alt="Corevinex Cybersecurity logo">
                </a>

                <nav class="links" aria-label="Primary navigation">
                    <a href="index.html">Home</a>
                    <a href="services.html">Services</a>
					<a href="about.html">About</a>
                    <a class="active" href="contact.html">Contact us</a>                   
                </nav>
            </div>
        </header>

        <main>
            <section class="section dark">
                <div class="container contact-grid">

                    <div class="panel reveal">
                        <div class="label">Contact us</div>

                        <h2>Start a security conversation.</h2>
<!--
                        <p>
                            Replace these placeholder details with your official contact information before publishing.
                        </p>
-->
                        <div class="steps">

                            <div class="step">
                                <div class="step-icon">@</div>

                                <div>
                                    <h3>Email</h3>
                                    <p>info@corevinex.com</p>
                                </div>
                            </div>

                            <div class="step">
                                <div class="step-icon">☎</div>

                                <div>
                                    <h3>Phone</h3>
                                    <p>+971 5231 01234</p>
                                </div>
                            </div>

                            <div class="step">
                                <div class="step-icon">⌂</div>

                                <div>
                                    <h3>Location</h3>
                                    <p>Dubai, United Arab Emirates</p>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="panel reveal">

                        <form class="form"
                            action="mailto:info@corevinex.com"
                            method="post"
                            enctype="text/plain">

                            <label>
                                Full name
                                <input
                                    name="name"
                                    placeholder="Your name"
                                    required>
                            </label>

                            <label>
                                Work email
                                <input
                                    type="email"
                                    name="email"
                                    placeholder="name@company.com"
                                    required>
                            </label>

                            <label>
                                Company
                                <input
                                    name="company"
                                    placeholder="Company name">
                            </label>

                            <label>
                                Phone
                                <input
                                    name="phone"
                                    placeholder="+971 (Include country code)">
                            </label>

                            <label class="full">
                                Cybersecurity requirement
                                <textarea
                                    name="message"
                                    placeholder="Tell us what you want to assess, protect, or improve"></textarea>
                            </label>

                            <button class="btn primary full" type="submit">
                                Send enquiry
                            </button>

                        </form>

                    </div>

                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="container footer-wrap">

                <img src="assets/corevinex-logo.svg" alt="Corevinex Cybersecurity logo">

                <div>
                    © 2026 Corevinex
                </div>

            </div>
        </footer>

    </div>

    <script src="js/main.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="description"
        content="Corevinex Cybersecurity — enterprise cyber defense, cloud security, incident readiness and global threat visibility.">

    <title>Corevinex | Contact us</title>
    <link rel="stylesheet" href="css/styles.css">
	<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
 	<link rel="icon" href="/favicon.ico" sizes="any">
</head>

<body>
    <div class="aurora"></div>
    <canvas id="particles" aria-hidden="true"></canvas>

    <div class="site">

        <header class="header">
            <div class="container nav">
                <a href="index.html">
                    <img class="logo" src="assets/corevinex-logo.svg" alt="Corevinex Cybersecurity logo">
                </a>

                <nav class="links" aria-label="Primary navigation">
                    <a href="index.html">Home</a>
                    <a href="services.html">Services</a>
					<a href="about.html">About</a>
                    <a class="active" href="contact.html">Contact us</a>                   
                </nav>
            </div>
        </header>

        <main>
            <section class="section dark">
                <div class="container contact-grid">

                    <div class="panel reveal">
                        <div class="label">Contact us</div>

                        <h2>Start a security conversation.</h2>
                        <div class="steps">

                            <div class="step">
                                <div class="step-icon">@</div>

                                <div>
                                    <h3>Email</h3>
                                    <p>info@corevinex.com</p>
                                </div>
                            </div>

                            <div class="step">
                                <div class="step-icon">☎</div>

                                <div>
                                    <h3>Phone</h3>
                                    <p>+971 5231 01234</p>
                                </div>
                            </div>

                            <div class="step">
                                <div class="step-icon">⌂</div>

                                <div>
                                    <h3>Location</h3>
                                    <p>Dubai, United Arab Emirates</p>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="panel reveal">


					<form class="form" id="contactForm">
    					<input type="hidden" name="access_key" value="84b2a17a-31e8-4d76-a32a-1616a235ef39">
   						<input type="hidden" name="subject" value="New Corevinex Inquiry">
						<input type="hidden" name="to" value="info@corevinex.com">
						<input type="checkbox" name="botcheck" style="display:none;">
                            <label>
                                Full name
                                <input
                                    name="name"
                                    placeholder="Your name"
                                    required>
                            </label>

                            <label>
                                Work email
                                <input
                                    type="email"
                                    name="email"
                                    placeholder="name@company.com"
                                    required>
                            </label>

                            <label>
                                Company
                                <input
                                    name="company"
                                    placeholder="Company name">
                            </label>

                            <label>
                                Phone
                                <input
                                    name="phone"
                                    placeholder="+971 (include country code)">
                            </label>

                            <label class="full">
                                Cybersecurity requirement
                                <textarea
                                    name="message"
                                    placeholder="Tell us what you want to assess, protect, or improve"></textarea>
                            </label>

                            <button class="btn primary full" type="submit">
                                Send enquiry
                            </button>

                        </form>
					<div id="result" style="margin-top:15px;"></div>
                    </div>

                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="container footer-wrap">
                <img class="logo" src="assets/corevinex-logo.svg" alt="Corevinex Cybersecurity logo">
                <div>
                    © 2026 Corevinex
                </div>
            </div>
        </footer>
    </div>
    <script src="js/main.js"></script>
	
<script>
const form = document.getElementById("contactForm");
const result = document.getElementById("result");

form.addEventListener("submit", function (e) {
    e.preventDefault();

    result.innerHTML = "Sending...";

    const formData = new FormData(form);

    fetch("https://api.web3forms.com/submit", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            result.innerHTML = "<span style='color:#00e6a8;'>✔ Request submitted successfully. We'll contact you shortly.</span>";
            form.reset();
        } else {
            result.innerHTML = "<span style='color:red;'>❌ Failed to send message.</span>";
        }
    })
    .catch(() => {
        result.innerHTML = "<span style='color:red;'>❌ Error submitting form.</span>";
    });
});
</script>

</body>
</html>
